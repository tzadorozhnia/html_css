<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Instagram</h1>
        </div>
        <form class="form-entry">
            <div class="form-content">
                <input type="text" name="login" id="login" placeholder="Номер телефону, ім'я користувача або email"
                       required>
                <input type="password" name="password" id="password" placeholder="Пароль" required>

                <div class="form-actions">

                    <button type="submit" class="submit-btn">Увійти</button>
                    <div class="form-divider">
                        АБО
                    </div>
                    <a href="#" class="fb-login">
                        <img src="img/facebook-icon.png" alt="Facebook" class="fb-icon">
                        Увійти через Facebook
                    </a>
                    <a href="#" class="forgot-password">Забули пароль?</a>
                </div>
            </div>
        </form>
    </div>

    <div class="signup-card">
        Не маєте облікового запису? <a href="#">Зареєструйтеся</a>
    </div>

</div>

</body>
</html>
